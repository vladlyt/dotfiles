set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:RGB"
set -g allow-passthrough on
set -as terminal-features 'xterm*:extkeys'
set -s extended-keys on
set -g mouse on
set -g history-limit 200000
set -g focus-events on
set -g prefix C-b
bind C-b send-prefix
setw -g mode-keys vi
bind | split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -n M-Left  previous-window
bind -n M-Right next-window
set -g base-index 1
setw -g pane-base-index 1
set -g message-style "bg=colour24,fg=colour231,bold"
set -g message-command-style "bg=colour24,fg=colour231"
set -g mode-style "bg=colour39,fg=colour232,bold"
set -g status-interval 2
set -g status-left-length 60
set -g status-right-length 120



# machine-aware status bar: blue for devpod, green for local
if-shell '[ "$(cat ~/.machine 2>/dev/null)" = "devpod" ]' \
  'set -g status-style "bg=colour24,fg=colour231"; \
   set -g status-left "#[bold] DEVPOD #S #[default] "; \
   setw -g window-status-current-format "#[fg=colour231,bg=colour33,bold] #I:#W #[default]"' \
  'set -g status-style "bg=colour22,fg=colour231"; \
   set -g status-left "#[bold] LOCAL #S #[default] "; \
   setw -g window-status-current-format "#[fg=colour231,bg=colour28,bold] #I:#W #[default]"'
set -g status-right "#[fg=colour250]#(whoami)@#H #[fg=colour255]%Y-%m-%d %H:%M#[default]"
setw -g window-status-format "#[fg=colour250] #I:#W "
# TPM plugins — only on local machine (devpods don't have TPM)
if-shell '[ "$(cat ~/.machine 2>/dev/null)" != "devpod" ]' \
  'set -g @plugin "tmux-plugins/tpm"; \
   set -g @plugin "tmux-plugins/tmux-sensible"; \
   set -g @plugin "tmux-plugins/tmux-resurrect"; \
   set -g @plugin "tmux-plugins/tmux-continuum"; \
   set -g @continuum-restore "on"; \
   set -g @resurrect-capture-pane-contents "on"; \
   run "~/.tmux/plugins/tpm/tpm"'