set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:RGB"
set -g mouse on
set -g history-limit 200000
set -g focus-events on
unbind C-b
set -g prefix C-a
bind C-a send-prefix
setw -g mode-keys vi
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
set -g base-index 1
setw -g pane-base-index 1
set -g status-interval 2
set -g status-left-length 60
set -g status-right-length 120



set -g status-style "bg=colour24,fg=colour231"
set -g status-left "#[bold] LOCAL #S #[default] "
set -g status-right "#[fg=colour250]#(whoami)@#H #[fg=colour255]%Y-%m-%d %H:%M#[default]"
setw -g window-status-format "#[fg=colour250] #I:#W "
setw -g window-status-current-format "#[fg=colour231,bg=colour28,bold] #I:#W #[default]"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'